# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: 'https://github.com/pre-commit/pre-commit-hooks'
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-check
        name: uvx ruff check
        entry: uvx ruff check . --fix --unsafe-fixes
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: ruff-format
        name: uvx ruff format
        entry: uvx ruff format .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pyrefly-infer
        name: uvx pyrefly infer
        entry: uvx pyrefly infer .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: ty-check
        name: uvx ty check
        entry: uvx ty check .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pyrefly-check
        name: uvx pyrefly check
        entry: uvx pyrefly check .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
